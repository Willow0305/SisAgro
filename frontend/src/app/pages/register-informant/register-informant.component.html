<div class="container">

  <h1>Cadastro de Informantes</h1>

  <div class="form-grid">

    <!-- SELECTS -->
    <div class="form-group">
      <label>Tipo de Informante:</label>
      <select>
        <option>Selecione</option>
      </select>
    </div>

    <div class="form-group">
      <label>Função do Informante no Estabelecimento:</label>
      <select>
        <option>Selecione</option>
      </select>
    </div>

    <!-- LINHA 1 -->
    <div class="form-group">
      <label>Nome do Informante:</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Coordenada Geográfica:</label>
      <input type="text">
    </div>

    <!-- LINHA 2 -->
    <div class="form-group">
      <label>Apelido do Informante (Se Houver):</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Telefone do Informante para Contato:</label>
      <input type="text">
    </div>

    <!-- LINHA 3 -->
    <div class="form-group">
      <label>Endereço do Informante para Coleta:</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>E-mail do Informante:</label>
      <input type="email">
    </div>

    <!-- LINHA 4 -->
    <div class="form-group">
      <label>Nome do Estabelecimento:</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Coordenada Geográfica do Estabelecimento:</label>
      <input type="text">
    </div>

    <!-- LINHA 5 -->
    <div class="form-group">
      <label>Endereço do Estabelecimento:</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>E-mail do Estabelecimento:</label>
      <input type="email">
    </div>

  </div>

  <!-- AÇÕES EXTRAS -->
  <div class="acoes">

    <button class="btn-add">+</button>
    <span>Adicionar endereço</span>

    <div class="checkbox-area">
      <input type="checkbox">
      <label>Reaproveitar endereço do informante?</label>
    </div>

  </div>

  <!-- OBS -->
  <div class="observacao">
    <label>Anotações Complementares de Cadastro (Se Houver)</label>
    <textarea></textarea>
  </div>

  <!-- BOTÕES -->
  <div class="botoes">
    <button class="btn vermelho">Cancelar</button>
    <button class="btn verde">Próximo</button>
  </div>

</div>
