<div class="questionnaire-container">
  <h1>Pesquisas e Produtos</h1>

  <!-- Loading -->
  <div *ngIf="carregando" class="loading">
    <p>Carregando dados...</p>
  </div>

  <!-- Error -->
  <div *ngIf="erro && !carregando" class="error">
    <p>{{ erro }}</p>
    <button (click)="carregarDados()">Tentar Novamente</button>
  </div>

  <!-- Content -->
  <div *ngIf="!carregando && !erro" class="content">
    <!-- Empty State -->
    <div *ngIf="pesquisas.length === 0" class="empty-state">
      <p>Nenhuma pesquisa encontrada</p>
    </div>

    <!-- Pesquisas -->
    <div *ngFor="let pesquisa of pesquisas" class="pesquisa-card">
      <div class="pesquisa-header">
        <h2>{{ pesquisa.nome }}</h2>
        <span class="data">{{ pesquisa.data_criacao | date: 'dd/MM/yyyy' }}</span>
      </div>

      <!-- Produtos -->
      <div class="produtos">
        <div *ngIf="pesquisa.produtos?.length === 0" class="no-produtos">
          <p>Nenhum produto nesta pesquisa</p>
        </div>

        <div *ngFor="let produto of pesquisa.produtos" class="produto-item">
          <div class="produto-info">
            <h3>{{ produto.nome }}</h3>
            <span class="data-produto">{{ produto.data_criacao | date: 'dd/MM/yyyy' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
